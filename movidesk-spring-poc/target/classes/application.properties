# Servidor executará na porta alternativa para não bater com o seu sistema principal
server.port=8082

# Credenciais de acesso ao seu MySQL na nuvem (as mesmas do .env)
# Atenção: Você precisa trocar pela sua URL oficial, igual está no .env
spring.datasource.url=jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuração Padrão do JPA / Hibernate
# "update" apenas sincroniza as tabelas mas NUNCA apaga dados
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# API Token do Movidesk - Também será injetado pelo ambiente
movidesk.api.token=${MOVIDESK_TOKEN}
movidesk.api.base-url=https://api.movidesk.com/public/v1/tickets
